*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;line-height:1.7;color:#1a1a2e;max-width:800px;margin:0 auto;padding:2rem 1.5rem}
